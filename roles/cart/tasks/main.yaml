- name: nodejs-setup
  ansible.builtin.include_role:
    name: common
    tasks_from: nodejs.yaml
  
- name: app-setup
  ansible.builtin.import_role:
    name: common
    task_from: app-setup.yaml
 

- name: system-setup
  ansible.builtin.include_role:
    name: common
    task_from: system-setup.yaml
  